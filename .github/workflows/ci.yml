name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan (64-hex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the scanner can also see anything that
          # leaked into older commits via untracked-then-tracked drift.
          fetch-depth: 0

      - name: Scan tracked + untracked files for plaintext private keys
        run: bash scripts/scan-secrets.sh

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm --filter @vpp/contracts run compile

      - name: Run tests with gas report
        run: pnpm --filter @vpp/contracts run test
        env:
          REPORT_GAS: 'true'

      - name: Check coverage
        run: pnpm --filter @vpp/contracts run coverage

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: contracts
          directory: packages/contracts/coverage
          fail_ci_if_error: true

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Compile contracts (needed for ABI)
        run: pnpm --filter @vpp/contracts run compile

      - name: Build backend
        run: pnpm --filter @vpp/backend run build

      - name: Run tests with coverage
        run: pnpm --filter @vpp/backend run test:coverage

      # Integration tests need a running Hardhat node + deployed/seeded
      # contract. Start the node in the background, wait for it to be
      # responsive, then deploy + seed before running the suite.
      - name: Start local Hardhat node
        working-directory: packages/contracts
        run: |
          nohup pnpm exec hardhat node > /tmp/hardhat-node.log 2>&1 &
          echo $! > /tmp/hardhat-node.pid
          for i in {1..30}; do
            if curl -s -o /dev/null -X POST -H "Content-Type: application/json" \
                --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
                http://127.0.0.1:8545; then
              echo "Hardhat node ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Deploy + seed V2 proxy on local node
        working-directory: packages/contracts
        run: pnpm exec hardhat run scripts/deploy-v2-local.ts --network localhost

      - name: Run integration tests
        run: pnpm --filter @vpp/backend run test:integration

      - name: Stop local Hardhat node
        if: always()
        run: |
          if [ -f /tmp/hardhat-node.pid ]; then
            kill "$(cat /tmp/hardhat-node.pid)" 2>/dev/null || true
          fi
          tail -n 50 /tmp/hardhat-node.log 2>/dev/null || true

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          directory: packages/backend/coverage
          fail_ci_if_error: true

  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check & build
        run: pnpm --filter @vpp/frontend run build

      - name: Run tests with coverage
        run: pnpm --filter @vpp/frontend run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          directory: packages/frontend/coverage
          fail_ci_if_error: true

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @vpp/frontend run build
        env:
          VITE_CONTRACT_ADDRESS: '0x0000000000000000000000000000000000000000'
          VITE_RPC_URL: 'https://sepolia.base.org'
          VITE_EXPLORER_URL: 'https://sepolia.basescan.org'

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun
