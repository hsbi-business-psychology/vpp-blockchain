name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm --filter @vpp/contracts run compile

      - name: Run tests with gas report
        run: pnpm --filter @vpp/contracts run test
        env:
          REPORT_GAS: 'true'

      - name: Check coverage
        run: pnpm --filter @vpp/contracts run coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: contracts
          directory: packages/contracts/coverage
          fail_ci_if_error: true

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Compile contracts (needed for ABI)
        run: pnpm --filter @vpp/contracts run compile

      - name: Build backend
        run: pnpm --filter @vpp/backend run build

      - name: Run tests with coverage
        run: pnpm --filter @vpp/backend run test:coverage

      - name: Run integration tests
        run: pnpm --filter @vpp/backend run test:integration

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          directory: packages/backend/coverage
          fail_ci_if_error: true

  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check & build
        run: pnpm --filter @vpp/frontend run build

      - name: Run tests with coverage
        run: pnpm --filter @vpp/frontend run test:coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend
          directory: packages/frontend/coverage
          fail_ci_if_error: true

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @vpp/frontend run build
        env:
          VITE_CONTRACT_ADDRESS: '0x0000000000000000000000000000000000000000'
          VITE_RPC_URL: 'https://sepolia.base.org'
          VITE_EXPLORER_URL: 'https://sepolia.basescan.org'

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun
