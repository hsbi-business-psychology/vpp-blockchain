name: Deploy to Plesk

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full upload (re-upload node_modules even if signature matches)'
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # 1. Compile contracts (ABI needed by backend)
      - name: Compile contracts
        run: pnpm --filter @vpp/contracts run compile

      # 2. Build backend
      - name: Build backend
        run: pnpm --filter @vpp/backend run build

      # 3. Build frontend with production env
      - name: Build frontend
        run: pnpm --filter @vpp/frontend run build
        env:
          VITE_APP_NAME: 'VPP Blockchain'
          VITE_API_URL: ''
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
          VITE_CONTRACT_ADDRESS: ${{ secrets.VITE_CONTRACT_ADDRESS }}
          VITE_CONTRACT_DEPLOY_BLOCK: ${{ secrets.VITE_CONTRACT_DEPLOY_BLOCK }}
          VITE_EXPLORER_URL: ${{ secrets.VITE_EXPLORER_URL }}
          VITE_DEFAULT_LOCALE: 'de'

      # 4. Assemble deploy folder
      - name: Assemble deploy folder
        run: bash scripts/build-deploy-ci.sh

      # 5. Deploy to Plesk via FTP with explicit TLS (STARTTLS on port 21)
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Capture the actual cert chain hosting.hsbi.de presents and trust it
      # for this run. Keeps TLS validation enabled (no blanket "trust anything")
      # while working around the DFN/HSBI CA missing from Ubuntu's bundle.
      - name: Pin hosting.hsbi.de TLS cert chain
        id: pin-cert
        run: |
          set -euo pipefail
          mkdir -p .ftp-trust
          # FTPS uses STARTTLS on port 21
          if openssl s_client -connect hosting.hsbi.de:21 -starttls ftp -showcerts \
              -servername hosting.hsbi.de </dev/null 2>/dev/null \
              | sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p' \
              > .ftp-trust/hsbi.pem
          then
            if [ -s .ftp-trust/hsbi.pem ]; then
              echo "verify=yes" >> "$GITHUB_OUTPUT"
              echo "Pinned $(grep -c BEGIN .ftp-trust/hsbi.pem) certs from hosting.hsbi.de"
            else
              echo "verify=no" >> "$GITHUB_OUTPUT"
              echo "::warning::Empty cert chain from hosting.hsbi.de — falling back to encrypted-but-unverified TLS"
            fi
          else
            echo "verify=no" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not fetch cert chain from hosting.hsbi.de — falling back to encrypted-but-unverified TLS"
          fi

      # Compute a deterministic signature of everything that affects what
      # ends up in node_modules. If the live server already has node_modules
      # produced from the same inputs, we can skip the ~36 MB upload entirely
      # and let lftp only push the small dist + public + app.js + package.json
      # files (a few hundred KB total). Cuts hot-fix deploy time from ~13 min
      # down to under a minute.
      - name: Compute node_modules signature
        id: nm-sig
        run: |
          HASH=$(cat \
              pnpm-lock.yaml \
              .nvmrc \
              packages/backend/package.json \
              scripts/build-deploy-ci.sh \
            | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          mkdir -p deploy
          echo "$HASH" > deploy/.deploy-meta
          echo "Local node_modules signature: $HASH"

      - name: Check live deploy signature
        id: live-sig
        env:
          FORCE_FULL: ${{ inputs.force_full || 'false' }}
          LOCAL_HASH: ${{ steps.nm-sig.outputs.hash }}
        run: |
          if [ "$FORCE_FULL" = "true" ]; then
            echo "match=no" >> "$GITHUB_OUTPUT"
            echo "Forced full upload via workflow_dispatch input."
            exit 0
          fi
          if [ "${{ steps.pin-cert.outputs.verify }}" = "yes" ]; then
            VERIFY_OPTS="set ssl:verify-certificate yes; set ssl:ca-file $(pwd)/.ftp-trust/hsbi.pem;"
          else
            VERIFY_OPTS="set ssl:verify-certificate no;"
          fi
          # `lftp cat` writes the file content to stdout. If the file does
          # not exist, lftp prints an error to stderr and exits non-zero —
          # we swallow both so first-time deploys still work.
          LIVE=$(lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ftp:ssl-protect-data yes;
            $VERIFY_OPTS
            set ftp:passive-mode yes;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp://hosting.hsbi.de;
            cat /httpdocs/.deploy-meta;
            quit;
          " 2>/dev/null | tr -d '\r\n ' || echo "")
          if [ -n "$LIVE" ] && [ "$LIVE" = "$LOCAL_HASH" ]; then
            echo "match=yes" >> "$GITHUB_OUTPUT"
            echo "Live signature matches local — skipping node_modules upload"
          else
            echo "match=no" >> "$GITHUB_OUTPUT"
            echo "Local: $LOCAL_HASH"
            echo "Live : ${LIVE:-<none>}"
            echo "Will perform full upload"
          fi

      - name: Deploy via FTP/TLS
        env:
          SKIP_NODE_MODULES: ${{ steps.live-sig.outputs.match == 'yes' && 'yes' || 'no' }}
        run: |
          if [ "${{ steps.pin-cert.outputs.verify }}" = "yes" ]; then
            VERIFY_OPTS="set ssl:verify-certificate yes; set ssl:ca-file $(pwd)/.ftp-trust/hsbi.pem;"
          else
            VERIFY_OPTS="set ssl:verify-certificate no;"
          fi
          if [ "$SKIP_NODE_MODULES" = "yes" ]; then
            EXTRA_EXCLUDE='--exclude-glob node_modules'
            echo "::notice::Skipping node_modules upload — server signature matches"
          else
            EXTRA_EXCLUDE=''
            echo "::notice::Full upload (node_modules included, ~36 MB)"
          fi
          # The mirror block uploads everything in deploy/ that has changed;
          # the explicit put afterwards always refreshes .deploy-meta and
          # touches tmp/restart.txt so Phusion Passenger picks up new dist/
          # files even when node_modules was skipped.
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ftp:ssl-protect-data yes;
            $VERIFY_OPTS
            set ftp:passive-mode yes;
            set ftp:ssl-protect-list yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 5;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp://hosting.hsbi.de;
            mirror --reverse --verbose --only-newer \
              $EXTRA_EXCLUDE \
              --exclude-glob .bin \
              --exclude-glob .env \
              --exclude-glob tmp \
              --exclude-glob .DS_Store \
              --exclude-glob .deploy-meta \
              deploy/ /httpdocs/;
            put deploy/.deploy-meta -o /httpdocs/.deploy-meta;
            mkdir -p /httpdocs/packages/backend/tmp;
            put /dev/null -o /httpdocs/packages/backend/tmp/restart.txt;
            quit;
          "
