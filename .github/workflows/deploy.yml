name: Deploy to Plesk

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # 1. Compile contracts (ABI needed by backend)
      - name: Compile contracts
        run: pnpm --filter @vpp/contracts run compile

      # 2. Build backend
      - name: Build backend
        run: pnpm --filter @vpp/backend run build

      # 3. Build frontend with production env
      - name: Build frontend
        run: pnpm --filter @vpp/frontend run build
        env:
          VITE_APP_NAME: 'VPP Blockchain'
          VITE_API_URL: ''
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
          VITE_CONTRACT_ADDRESS: ${{ secrets.VITE_CONTRACT_ADDRESS }}
          VITE_CONTRACT_DEPLOY_BLOCK: ${{ secrets.VITE_CONTRACT_DEPLOY_BLOCK }}
          VITE_EXPLORER_URL: ${{ secrets.VITE_EXPLORER_URL }}
          VITE_DEFAULT_LOCALE: 'de'

      # 4. Assemble deploy folder
      - name: Assemble deploy folder
        run: bash scripts/build-deploy-ci.sh

      # 5. Deploy to Plesk via FTP with explicit TLS (STARTTLS on port 21)
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP/TLS
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ftp:ssl-protect-data yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set ftp:ssl-protect-list yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 3;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftp://hosting.hsbi.de;
            mirror --reverse --verbose --exclude .bin/ --exclude .env deploy/ /httpdocs/;
            quit;
          "
